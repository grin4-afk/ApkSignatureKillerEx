name: Build Killer Module Only

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-killer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Build killer module only
        run: ./gradlew :killer:assembleDebug
      
      - name: Upload killer AAR
        uses: actions/upload-artifact@v4
        with:
          name: killer-debug-aar
          path: killer/build/outputs/aar/*.aar
      
      # Optional: Upload native debug symbols if needed
      - name: Upload native debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: killer-native-symbols
          path: killer/build/intermediates/cmake/debug/obj/**/*
      
      # List built artifacts for verification
      - name: List built artifacts
        run: |
          echo "=== Built AAR files ==="
          find killer/build/outputs -name "*.aar" -type f | sort
          echo ""
          echo "=== Native libraries ==="
          find killer/build/intermediates/cmake -name "*.so" -type f | sort
